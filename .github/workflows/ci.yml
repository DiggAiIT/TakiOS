name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: takios
          POSTGRES_PASSWORD: takios
          POSTGRES_DB: takios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U takios"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://takios:takios@localhost:5432/takios
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      ANTHROPIC_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Lint (ruff)
        run: cd backend && ruff check .

      - name: Shell validation
        run: bash -n backend/entrypoint.sh && bash -n setup.sh

      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Motor tests
        run: node tests/motor.test.cjs

      - name: Eval-motor tests
        run: node tests/eval-motor.test.cjs

      - name: MCP-Gemini tests
        run: node tests/mcp-gemini.test.cjs

  i18n-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check i18n key symmetry
        run: python scripts/check_i18n.py