name: Dream Cycle (Memory Consolidation)

on:
  schedule:
    # Every 12 hours (EU AI Act Art. 12 – Traceability / AutoDream)
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force dream cycle even below threshold"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  dream-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use PAT so the commit can trigger downstream workflows
          token: ${{ secrets.GITHUB_PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Dream Cycle (Memory Compaction)
        run: node bin/lib/motor.cjs --mode dream-cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORCE_DREAM: ${{ github.event.inputs.force }}

      - name: Commit consolidated memory index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(dream): auto-compact memory index [skip ci]"
          file_pattern: "memory/**"
          commit_user_name: "TakiOS Dream Agent"
          commit_user_email: "dream-agent@takios.app"
