version: "3.9"

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: takios
      POSTGRES_PASSWORD: takios
      POSTGRES_DB: takios
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takios"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://takios:takios@postgres:5432/takios
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      SEED_DATA: ${SEED_DATA:-0}
      # Agent Team
      MODEL_ROUTING_PROFILE: ${MODEL_ROUTING_PROFILE:-balanced}
      OPUS_MODEL: ${OPUS_MODEL:-claude-opus-4-20250514}
      SONNET_MODEL: ${SONNET_MODEL:-claude-sonnet-4-20250514}
      HAIKU_MODEL: ${HAIKU_MODEL:-claude-haiku-3-20250414}
      DREAM_INTERVAL_HOURS: ${DREAM_INTERVAL_HOURS:-12}
      DREAM_SESSION_THRESHOLD: ${DREAM_SESSION_THRESHOLD:-50}
      MAX_INDEX_LINES: ${MAX_INDEX_LINES:-200}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_INTERNAL_API_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio_data:
